---
name: Update PR Description with Rigging
on:
  pull_request:
    types: [opened]

jobs:
  update-description:
    name: Update PR Description with Rigging
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # full history for proper diffing

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          pip install uv

      - name: Generate PR Description
        id: description
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          DESCRIPTION="$(uv run --no-project .hooks/generate_pr_description.py --base-ref "origin/${{ github.base_ref }}" --exclude "./*.lock")"
          {
            echo "description<<EOF"
            echo "${DESCRIPTION}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Update PR Description
        uses: nefrob/pr-description@30859d560129561327a48ec569ec3b6aa62dd2c9 # v1.3.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          content: |

            ---

            ## Generated Summary:

            ${{ steps.description.outputs.description }}

            This summary was generated with ❤️ by [rigging](https://rigging.dreadnode.io/)
