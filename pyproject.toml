[project]
name = "dreadnode"
version = "0.1.2"
description = "Dreadnode SDK"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "coolname>=2.2.0",
    "fast-depends>=2.4.12",
    "httpx>=0.28.1",
    "logfire>=3.12.0",
    "pandas>=2.2.3",
    "pyarrow>=19.0.1",
    "pydantic>=2.11.1",
    "python-ulid>=3.0.0",
    "ruamel-yaml>=0.18.10",
    "transformers>=4.50.3",
]

[dependency-groups]
dev = [
    "docstring-parser>=0.16",
    "mypy>=1.15.0",
    "pre-commit>=4.2.0",
    "pytest>=8.3.5",
    "pytest-asyncio>=0.26.0",
    "ruff>=0.11.2",
    "types-protobuf>=5.29.1.20250315",
]

[tool.mypy]
strict = true

[tool.ruff]
line-length = 120
indent-width = 4
target-version = "py310"
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "C",   # flake8-comprehensions
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "NPY", # numpydoc
    "A",   # flake8-annotations
]
ignore = [
    "E501", # line too long, handled by ruff
    "B008", # do not perform function calls in argument defaults
    "C901", # too complex
    "W191", # indentation contains tabs
    "F722", # syntax error in forward annotation
    "A001", # shadowing built-in
    "A002", # shadowing built-in
]
exclude = [
    ".git",
    ".git-rewrite",
    ".mypy_cache",
    ".ruff_cache",
    "__pypackages__",
    "build",
    "dist",
    ".venv",
    "venv",
]

[tool.ruff.lint]
fixable = ["ALL"]
unfixable = ["B"]
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
